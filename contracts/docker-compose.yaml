# Inco local node: anvil (EVM) + covalidator (TEE simulator that decrypts/signs).
# Required for Hardhat TS tests and local deploys (the covalidator produces the
# decryption attestations our settle() calls verify on-chain).
#
#   docker compose up -d      # start
#   docker compose down       # stop
#   docker compose logs -f    # tail logs
services:
  anvil:
    image: inconetwork/local-node-anvil-testnet:v0.7.10
    # Images are amd64-only; on Apple Silicon, Docker emulates via Rosetta/QEMU.
    platform: linux/amd64
    ports:
      - "8545:8545"

  covalidator:
    image: inconetwork/local-node-covalidator-testnet:v0.7.10
    platform: linux/amd64
    depends_on:
      - anvil
    ports:
      - "50055:50055"
